<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SmartCity Brescia - User Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SmartCity Brescia</h1>
        <div id="user-info" class="hidden">
            <span id="username-display"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <main>
        <section id="login-section">
            <h2>Accesso Cittadino</h2>
            <p>Inserisci le credenziali fornite dall'Ufficio Mobilità Sostenibile.</p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Accedi</button>
            </form>
        </section>

        <section id="user-dashboard" class="hidden">
            <div class="tabs">
                <button onclick="showTab('parking')">Aree Parcheggio</button>
                <button onclick="showTab('history')">I Miei Parcheggi</button>
            </div>

            <div id="parking-tab" class="tab-content">
                <h2>Aree Attive</h2>
                <div id="parking-list" class="grid-container">
                    </div>
            </div>

            <div id="history-tab" class="tab-content hidden">
                <h2>Storico Prenotazioni</h2>
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Area</th>
                            <th>Durata</th>
                            <th>Stato</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
